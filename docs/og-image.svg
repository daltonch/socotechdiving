<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="20%" cy="0%" r="95%">
      <stop offset="0%" stop-color="#143a5e"/>
      <stop offset="55%" stop-color="#0a1929"/>
      <stop offset="100%" stop-color="#0a1929"/>
    </radialGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    </pattern>
    <radialGradient id="gridFade" cx="78%" cy="48%" r="55%">
      <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <mask id="gridMask">
      <rect width="1200" height="630" fill="url(#gridFade)"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a1929"/>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" mask="url(#gridMask)"/>

  <!-- Large faint gauge mark, right side -->
  <g transform="translate(815 75) scale(13)" fill="none" opacity="0.5">
    <circle cx="18" cy="18" r="15" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="18" cy="18" r="10.5" stroke="rgba(245,242,234,0.25)" stroke-width="0.7"/>
    <line x1="18" y1="6.5" x2="18" y2="9.5" stroke="#f5f2ea" stroke-width="1" stroke-linecap="round"/>
    <line x1="18" y1="26.5" x2="18" y2="29.5" stroke="#f5f2ea" stroke-width="1" stroke-linecap="round"/>
    <line x1="6.5" y1="18" x2="9.5" y2="18" stroke="#f5f2ea" stroke-width="1" stroke-linecap="round"/>
    <line x1="26.5" y1="18" x2="29.5" y2="18" stroke="#f5f2ea" stroke-width="1" stroke-linecap="round"/>
    <line x1="18" y1="18" x2="24.5" y2="11.5" stroke="#ff6b35" stroke-width="1.4" stroke-linecap="round"/>
    <circle cx="18" cy="18" r="3" fill="#f5f2ea"/>
  </g>

  <!-- Brand row: gauge mark + wordmark -->
  <g transform="translate(80 86) scale(2.0)" fill="none">
    <rect width="36" height="36" rx="8" fill="#0a1929"/>
    <circle cx="18" cy="18" r="15" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="18" cy="18" r="10.5" stroke="rgba(245,242,234,0.45)" stroke-width="1.2"/>
    <line x1="18" y1="6.5" x2="18" y2="9.5" stroke="#f5f2ea" stroke-width="2" stroke-linecap="round"/>
    <line x1="18" y1="26.5" x2="18" y2="29.5" stroke="#f5f2ea" stroke-width="2" stroke-linecap="round"/>
    <line x1="6.5" y1="18" x2="9.5" y2="18" stroke="#f5f2ea" stroke-width="2" stroke-linecap="round"/>
    <line x1="26.5" y1="18" x2="29.5" y2="18" stroke="#f5f2ea" stroke-width="2" stroke-linecap="round"/>
    <line x1="18" y1="18" x2="24.5" y2="11.5" stroke="#ff6b35" stroke-width="2.6" stroke-linecap="round"/>
    <circle cx="18" cy="18" r="3" fill="#f5f2ea"/>
  </g>
  <text x="172" y="135" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="700" font-size="46" letter-spacing="-1">
    <tspan fill="#f5f2ea">SoCo</tspan><tspan fill="rgba(245,242,234,0.5)">Tech</tspan><tspan fill="#f5f2ea">Diving</tspan>
  </text>

  <!-- Eyebrow -->
  <text x="82" y="245" font-family="Menlo, monospace" font-size="22" letter-spacing="4" fill="#00d4ff">TECH DIVING · SOUTH COUNTY, MO</text>

  <!-- Headline -->
  <text x="78" y="345" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="700" font-size="92" letter-spacing="-3" fill="#f5f2ea">Clean gas.</text>
  <text x="78" y="445" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="700" font-size="92" letter-spacing="-3" fill="#f5f2ea">Honest fills.</text>

  <!-- Services line -->
  <text x="82" y="520" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="500" font-size="30" fill="#9fb3c4">Air · Nitrox · Trimix · 100% O&#8322; Fills · Visual Inspections</text>

  <!-- Accent bar + URL -->
  <rect x="82" y="558" width="46" height="4" rx="2" fill="#ff6b35"/>
  <text x="142" y="571" font-family="Menlo, monospace" font-size="24" letter-spacing="1" fill="#f5f2ea">socotechdiving.com</text>
  <text x="1118" y="571" text-anchor="end" font-family="Menlo, monospace" font-size="20" letter-spacing="1" fill="rgba(245,242,234,0.55)">Recreational &amp; technical divers welcome</text>
</svg>
